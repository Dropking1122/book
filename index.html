<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MIMI</title>
  <meta name="description" content="By Revaldi Eka M">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.8.3/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.9.2/jquery-ui.min.js"></script>

  <script>
    // Membuat query string cache-buster
    const cacheBuster = '?v=' + new Date().getTime();
    document.write('<link rel="stylesheet" type="text/css" href="css/style.css' + cacheBuster + '">');
    document.write('<link rel="stylesheet" type="text/css" href="css/font-awesome.css' + cacheBuster + '">');
    document.write('<script src="js/flipbook.min.js' + cacheBuster + '"><\/script>');
  </script>
</head>
<body>
  <audio id="background-music" loop>
    <source id="audio-source" src="mp3/lagu.mp3" type="audio/mp3">
    Your browser does not support the audio element.
  </audio>

  <div id="container"></div>

  <script type="text/javascript">
    $(document).ready(function () {
      const cacheBuster = '?v=' + new Date().getTime();

      // Set audio source dengan cache buster
      document.getElementById("audio-source").src = "mp3/lagu.mp3" + cacheBuster;

      let music = document.getElementById("background-music");

      function playMusic() {
        music.play().catch(error => {
          console.log("Autoplay prevented: ", error);
        });
        document.removeEventListener("click", playMusic);
      }

      document.addEventListener("click", playMusic);
      
      $("#container").flipBook({
        pages: [
  { src: "images/book2/page1.png" + cacheBuster, thumb: "images/book2/thumb1.png" + cacheBuster, title: "Cover" },
  { src: "images/book2/page2.png" + cacheBuster, thumb: "images/book2/thumb2.png" + cacheBuster, title: "Page dua" },
  { src: "images/book2/page3.png" + cacheBuster, thumb: "images/book2/thumb3.png" + cacheBuster, title: "Page tiga" },
  { src: "images/book2/page4.png" + cacheBuster, thumb: "images/book2/thumb4.png" + cacheBuster, title: "Page empat" },
  { src: "images/book2/page5.png" + cacheBuster, thumb: "images/book2/thumb5.png" + cacheBuster, title: "Page lima" },
  { src: "images/book2/page6.png" + cacheBuster, thumb: "images/book2/thumb6.png" + cacheBuster, title: "Page enam" },
  { src: "images/book2/page7.png" + cacheBuster, thumb: "images/book2/thumb7.png" + cacheBuster, title: "Page tujuh" },
  { src: "images/book2/page8.png" + cacheBuster, thumb: "images/book2/thumb8.png" + cacheBuster, title: "Page delapan" },
  { src: "images/book2/page9.png" + cacheBuster, thumb: "images/book2/thumb9.png" + cacheBuster, title: "Page sembilan" },
  { src: "images/book2/page10.png" + cacheBuster, thumb: "images/book2/thumb10.png" + cacheBuster, title: "Page sepuluh" },
  { src: "images/book2/page11.png" + cacheBuster, thumb: "images/book2/thumb11.png" + cacheBuster, title: "Page sebelas" },
  { src: "images/book2/page12.png" + cacheBuster, thumb: "images/book2/thumb12.png" + cacheBuster, title: "Page dua belas" },
  { src: "images/book2/page13.png" + cacheBuster, thumb: "images/book2/thumb13.png" + cacheBuster, title: "Page tiga belas" },
  { src: "images/book2/page14.png" + cacheBuster, thumb: "images/book2/thumb14.png" + cacheBuster, title: "Page empat belas" },
  { src: "images/book2/page15.png" + cacheBuster, thumb: "images/book2/thumb15.png" + cacheBuster, title: "Page lima belas" },
  { src: "images/book2/page16.png" + cacheBuster, thumb: "images/book2/thumb16.png" + cacheBuster, title: "Page enam belas" }],
        onShow: function () {
          music.play();
        },
        onHide: function () {
          music.pause();
          music.currentTime = 0;
        }
      });
    });
  </script>
</body>
</html>
