<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MIMI</title>
  <meta name="description" content="By Revaldi Eka M">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.8.3/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.9.2/jquery-ui.min.js"></script>

  <script>
    const cacheBuster = '?v=' + new Date().getTime();
    document.write('<link rel="stylesheet" type="text/css" href="css/style.css' + cacheBuster + '">');
    document.write('<link rel="stylesheet" type="text/css" href="css/font-awesome.css' + cacheBuster + '">');
    document.write('<script src="js/flipbook.min.js' + cacheBuster + '"><\/script>');
  </script>
</head>
<body>
  <audio id="background-music" loop>
    <source id="audio-source" src="mp3/lagu.mp3" type="audio/mp3">
    Your browser does not support the audio element.
  </audio>

  <div id="container"></div>

  <script type="text/javascript">
    $(document).ready(function () {
      const cacheBuster = '?v=' + new Date().getTime();

      document.getElementById("audio-source").src = "mp3/lagu.mp3" + cacheBuster;
      let music = document.getElementById("background-music");

      function playMusic() {
        music.play().catch(function(error) {
          console.log("Autoplay prevented: ", error);
        });
        document.removeEventListener("click", playMusic);
      }
      document.addEventListener("click", playMusic);

      fetch('/api/pages')
        .then(function(res) { return res.json(); })
        .then(function(pages) {
          var pagesWithCache = pages.map(function(p) {
            return {
              src: p.src + cacheBuster,
              thumb: p.thumb + cacheBuster,
              title: p.title
            };
          });

          $("#container").flipBook({
            pages: pagesWithCache,
            onShow: function () { music.play(); },
            onHide: function () { music.pause(); music.currentTime = 0; }
          });
        })
        .catch(function(err) {
          console.error("Gagal memuat halaman:", err);
        });
    });
  </script>
</body>
</html>
